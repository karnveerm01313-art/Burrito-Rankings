<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Ball Run Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen text-slate-800">

    <header class="bg-white shadow-sm border-b border-slate-200 py-4 px-6 max-w-7xl mx-auto mt-4 rounded-t-xl flex flex-col sm:flex-row justify-between items-center gap-4">
        <h1 class="text-3xl font-bold text-slate-800">Team Ball Run Rankings</h1>
        <div class="flex gap-2">
            <button class="bg-blue-500 text-white font-semibold px-4 py-2 rounded-lg shadow-sm hover:bg-blue-600 transition">Leaderboard</button>
            <button class="bg-slate-200 text-slate-700 font-semibold px-4 py-2 rounded-lg hover:bg-slate-300 transition">Team Matchmaker</button>
            <button class="bg-slate-200 text-slate-700 font-semibold px-4 py-2 rounded-lg hover:bg-slate-300 transition">👑 1v1 Bracket</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="lg:col-span-2 bg-white rounded-xl shadow-sm p-6 border border-slate-200">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <h2 class="text-xl font-bold text-slate-800">Player Leaderboard</h2>
                <div class="inline-flex rounded-md shadow-sm bg-slate-100 p-1 border border-slate-200">
                    <button onclick="sortData('tier')" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white text-slate-700 shadow-sm border border-slate-200/50">Sort by Tier</button>
                    <button onclick="sortData('winRate')" class="px-4 py-1.5 text-sm font-medium rounded-md text-slate-600 hover:text-slate-900 ml-1">Sort by Win %</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-100 text-slate-400 text-sm font-medium">
                            <th class="py-3 px-4">Name</th>
                            <th class="py-3 px-4">Rankings</th>
                            <th class="py-3 px-4">Record</th>
                            <th class="py-3 px-4 text-right">Win %</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-100 text-sm font-semibold text-slate-700">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Tier Reference Guide</h3>
                <div class="space-y-2">
                    <div class="flex items-center gap-2"><span class="px-2 py-0.5 rounded text-xs bg-purple-100 text-purple-700 font-bold">yn</span> <span class="text-xs text-slate-500">(Peak)</span></div>
                    <div class="flex items-center gap-2"><span class="px-2 py-0.5 rounded text-xs bg-green-100 text-green-700 font-bold">Carry</span></div>
                    <div class="flex items-center gap-2"><span class="px-2 py-0.5 rounded text-xs bg-yellow-100 text-yellow-700 font-bold">Staple</span></div>
                    <div class="flex items-center gap-2"><span class="px-2 py-0.5 rounded text-xs bg-orange-100 text-orange-700 font-bold">Body</span></div>
                    <div class="flex items-center gap-2"><span class="px-2 py-0.5 rounded text-xs bg-red-100 text-red-700 font-bold">Liability</span></div>
                </div>
            </div>
        </section>
    </main>

    <div id="player-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden justify-center items-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-slate-200">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="modal-name" class="text-2xl font-bold text-slate-800"></h3>
                    <span id="modal-tier" class="inline-block mt-1 px-2.5 py-0.5 rounded text-xs font-bold"></span>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
            </div>
            <hr class="border-slate-100 my-4">
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="block text-xs text-slate-400 font-medium uppercase tracking-wider">Height</span>
                    <span id="modal-height" class="text-lg font-bold text-slate-700"></span>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="block text-xs text-slate-400 font-medium uppercase tracking-wider">Weight</span>
                    <span id="modal-weight" class="text-lg font-bold text-slate-700"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playersData = [];

        // Helper function to auto-assign colors based on text keywords
        function getTierClass(tierName) {
            const lower = tierName.toLowerCase();
            if (lower.includes('yn')) return 'bg-purple-100 text-purple-700';
            if (lower.includes('carry')) return 'bg-green-100 text-green-700';
            if (lower.includes('staple')) return 'bg-yellow-100 text-yellow-700';
            if (lower.includes('body')) return 'bg-orange-100 text-orange-700';
            if (lower.includes('liability')) return 'bg-red-100 text-red-700';
            return 'bg-slate-100 text-slate-600'; // Default backup
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch('players.json');
                const rawData = await response.json();
                
                // Process mathematical calculations on the fly
                playersData = rawData.map(player => {
                    const totalGames = player.wins + player.losses;
                    const winRate = totalGames > 0 ? (player.wins / totalGames) * 100 : 0.0;
                    return {
                        ...player,
                        winRate: winRate,
                        record: `${player.wins}-${player.losses}`,
                        tierClass: getTierClass(player.tier)
                    };
                });

                renderTable(playersData);
            } catch (error) {
                console.error("Data error:", error);
            }
        }

        function renderTable(data) {
            const tableBody = document.getElementById('leaderboard-body');
            tableBody.innerHTML = '';

            data.forEach((player, index) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition border-b border-slate-100/70";
                row.innerHTML = `
                    <td class="py-3.5 px-4 text-blue-600 hover:underline cursor-pointer font-bold" onclick="openModal(${index})">
                        ${player.name}
                    </td>
                    <td class="py-3.5 px-4">
                        <span class="px-2 py-0.5 rounded text-xs font-bold ${player.tierClass}">${player.tier}</span>
                    </td>
                    <td class="py-3.5 px-4 font-mono text-slate-600">${player.record}</td>
                    <td class="py-3.5 px-4 text-right font-mono font-bold">${player.winRate.toFixed(1)}%</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function openModal(index) {
            const player = playersData[index];
            document.getElementById('modal-name').innerText = player.name;
            document.getElementById('modal-tier').innerText = player.tier;
            document.getElementById('modal-tier').className = `inline-block mt-1 px-2.5 py-0.5 rounded text-xs font-bold ${player.tierClass}`;
            document.getElementById('modal-height').innerText = player.height || 'N/A';
            document.getElementById('modal-weight').innerText = player.weight || 'N/A';

            document.getElementById('player-modal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('player-modal').classList.replace('flex', 'hidden');
        }

        window.onclick = function(e) {
            if (e.target === document.getElementById('player-modal')) closeModal();
        }

        function sortData(criteria) {
            let sorted = [...playersData];
            if (criteria === 'winRate') {
                sorted.sort((a, b) => b.winRate - a.winRate);
            } else if (criteria === 'tier') {
                sorted.sort((a, b) => a.tier.localeCompare(b.tier));
            }
            renderTable(sorted);
        }

        window.onload = loadLeaderboard;
    </script>
</body>
</html>
